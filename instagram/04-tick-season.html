<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;box-sizing:border-box}
  body{width:1080px;height:1080px;overflow:hidden;background:#0a0c08;color:#eef0e2;font-family:"Oswald",sans-serif;position:relative;
    background-image:radial-gradient(80% 60% at 50% 38%,rgba(255,59,47,.14),transparent 60%),
      repeating-linear-gradient(0deg,rgba(255,255,255,.015) 0 1px,transparent 1px 5px)}
  .tape{position:absolute;top:0;left:0;right:0;background:#ff3b2f;color:#fff;font-family:"Space Mono",monospace;font-weight:700;
    font-size:20px;letter-spacing:.22em;text-align:center;padding:14px 0;text-transform:uppercase}
  .stack{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 80px}
  .eyebrow{font-family:"Space Mono",monospace;font-size:21px;letter-spacing:.34em;color:#ffb400;text-transform:uppercase;margin-bottom:20px}
  .tick{width:330px;height:250px;filter:drop-shadow(0 0 34px rgba(182,255,46,.5))}
  h1{font-family:"Anton",sans-serif;font-size:118px;line-height:.86;text-transform:uppercase;margin-top:6px}
  h1 span{color:#ff3b2f}
  p.body{font-size:30px;line-height:1.4;color:#cdd2be;max-width:26ch;margin-top:22px}
  p.body b{color:#b6ff2e}
  .foot{position:absolute;bottom:46px;left:0;right:0;text-align:center;
    font-family:"Space Mono",monospace;font-size:24px;letter-spacing:.16em;color:#8a917c;text-transform:uppercase}
  .foot b{color:#b6ff2e}
</style></head><body>
  <div class="tape">⚠ Tick Season Advisory · Franklin, TN ⚠</div>
  <div class="stack">
    <p class="eyebrow">New On The Board</p>
    <svg class="tick" viewBox="0 0 120 90">
      <g fill="#b6ff2e"><ellipse cx="68" cy="50" rx="30" ry="24"/><ellipse cx="46" cy="50" rx="13" ry="16" fill="#8AE234"/></g>
      <path d="M33 44 L21 47 L21 53 L33 56 Z" fill="#b6ff2e"/>
      <path d="M21 50 L12 50" stroke="#b6ff2e" stroke-width="2.6" stroke-linecap="round"/>
      <g stroke="#b6ff2e" stroke-width="3" stroke-linecap="round" fill="none">
        <path d="M42 40 C32 30 26 28 18 24"/><path d="M48 36 C42 26 38 22 32 16"/><path d="M54 34 C50 24 48 18 46 12"/><path d="M60 34 C58 24 58 18 58 12"/>
        <path d="M42 60 C32 70 26 72 18 76"/><path d="M48 64 C42 74 38 78 32 84"/><path d="M54 66 C50 76 48 82 46 88"/><path d="M60 66 C58 76 58 82 58 88"/></g>
    </svg>
    <h1>Ticks Are<br><span>Out</span></h1>
    <p class="body">They wait in tall grass and hitch a ride on you and your pets. We treat the yard, brush line, and pet paths. <b>Don't wait for the bite.</b></p>
  </div>
  <div class="foot"><b>@thebuggybros</b> &nbsp;—&nbsp; Who You Gonna Call?</div>
</body></html>
