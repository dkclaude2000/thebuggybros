<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;box-sizing:border-box}
  body{width:1080px;height:1080px;overflow:hidden;background:#0a0c08;color:#eef0e2;font-family:"Oswald",sans-serif;
    background-image:radial-gradient(90% 60% at 50% 0%,rgba(182,255,46,.12),transparent 60%),
      repeating-linear-gradient(0deg,rgba(255,255,255,.015) 0 1px,transparent 1px 5px);padding:60px;
    display:flex;flex-direction:column;justify-content:center}
  .head{display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:44px}
  .eyebrow{font-family:"Space Mono",monospace;font-size:20px;letter-spacing:.36em;color:#b6ff2e;text-transform:uppercase;margin-bottom:14px}
  h1{font-family:"Anton",sans-serif;font-size:96px;text-transform:uppercase;line-height:.9}
  h1 span{color:#b6ff2e}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:26px}
  .agent{border:1px solid #2a3120;border-radius:8px;background:#12160d;overflow:hidden;text-align:center;padding-bottom:26px}
  .agent .badge{display:inline-block;margin:20px 0 4px;font-family:"Space Mono",monospace;font-size:15px;letter-spacing:.14em;
    color:#0a0c08;background:#b6ff2e;padding:4px 12px;border-radius:3px;text-transform:uppercase;font-weight:700}
  .por{height:230px;display:grid;place-items:center;background:radial-gradient(60% 60% at 50% 45%,rgba(182,255,46,.14),transparent 70%)}
  .por svg{height:200px;filter:drop-shadow(0 0 20px rgba(182,255,46,.4))}
  .agent h3{font-family:"Anton",sans-serif;font-size:52px;text-transform:uppercase;margin:6px 0 4px}
  .role{font-family:"Space Mono",monospace;font-size:17px;letter-spacing:.1em;text-transform:uppercase;color:#ffb400}
  .foot{text-align:center;margin-top:42px;font-family:"Space Mono",monospace;font-size:24px;letter-spacing:.16em;color:#8a917c;text-transform:uppercase}
  .foot b{color:#b6ff2e}
</style></head><body>
  <div class="head">
    <p class="eyebrow">Three Partners · One Number</p>
    <h1>Meet The <span>Crew</span></h1>
  </div>
  <div class="grid">
    <div class="agent"><span class="badge">Agent 001</span>
      <div class="por"><svg viewBox="0 0 80 110"><ellipse cx="40" cy="96" rx="30" ry="16" fill="#171c10"/><rect x="16" y="60" width="48" height="42" rx="8" fill="#0e120a" stroke="#b6ff2e" stroke-width="2"/><circle cx="40" cy="40" r="20" fill="#b6ff2e"/><rect x="24" y="52" width="32" height="10" rx="4" fill="#8AE234"/><circle cx="40" cy="78" r="7" fill="none" stroke="#ff3b2f" stroke-width="2.4"/><line x1="35" y1="83" x2="45" y2="73" stroke="#ff3b2f" stroke-width="2.4"/></svg></div>
      <h3>David</h3><p class="role">Lead Exterminator</p></div>
    <div class="agent"><span class="badge">Agent 002</span>
      <div class="por"><svg viewBox="0 0 80 110"><ellipse cx="40" cy="96" rx="30" ry="16" fill="#171c10"/><rect x="16" y="60" width="48" height="42" rx="8" fill="#0e120a" stroke="#b6ff2e" stroke-width="2"/><circle cx="40" cy="40" r="20" fill="#b6ff2e"/><rect x="24" y="52" width="32" height="10" rx="4" fill="#8AE234"/><circle cx="40" cy="78" r="7" fill="none" stroke="#ffb400" stroke-width="2.4"/><line x1="35" y1="83" x2="45" y2="73" stroke="#ffb400" stroke-width="2.4"/></svg></div>
      <h3>Luke</h3><p class="role">Field Specialist</p></div>
    <div class="agent"><span class="badge">Agent 003</span>
      <div class="por"><svg viewBox="0 0 80 110"><ellipse cx="40" cy="96" rx="30" ry="16" fill="#171c10"/><rect x="16" y="60" width="48" height="42" rx="8" fill="#0e120a" stroke="#b6ff2e" stroke-width="2"/><circle cx="40" cy="40" r="20" fill="#b6ff2e"/><rect x="24" y="52" width="32" height="10" rx="4" fill="#8AE234"/><circle cx="40" cy="78" r="7" fill="none" stroke="#b6ff2e" stroke-width="2.4"/><line x1="35" y1="83" x2="45" y2="73" stroke="#b6ff2e" stroke-width="2.4"/></svg></div>
      <h3>Will</h3><p class="role">Prevention &amp; Sealing</p></div>
  </div>
  <p class="foot">David · Luke · Will &nbsp;—&nbsp; <b>@thebuggybros</b> &nbsp; Franklin, TN</p>
</body></html>
