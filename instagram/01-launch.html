<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;box-sizing:border-box}
  body{width:1080px;height:1080px;overflow:hidden;background:#0a0c08;color:#eef0e2;
    font-family:"Oswald",sans-serif;position:relative;
    background-image:radial-gradient(90% 70% at 50% 30%,rgba(182,255,46,.14),transparent 60%),
      repeating-linear-gradient(0deg,rgba(255,255,255,.015) 0 1px,transparent 1px 5px)}
  .tape{position:absolute;top:0;left:0;right:0;background:#f5d000;color:#111;
    font-family:"Space Mono",monospace;font-weight:700;font-size:20px;letter-spacing:.2em;
    text-align:center;padding:14px 0;text-transform:uppercase}
  .stack{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 70px}
  .eyebrow{font-family:"Space Mono",monospace;font-size:22px;letter-spacing:.4em;color:#b6ff2e;text-transform:uppercase;margin-bottom:26px}
  .sigil{width:300px;height:300px;filter:drop-shadow(0 0 40px rgba(255,59,47,.4))}
  h1{font-family:"Anton",sans-serif;font-size:138px;line-height:.9;text-transform:uppercase;margin:20px 0 0}
  h1 .the{display:block;font-size:42px;line-height:1;letter-spacing:.42em;color:#eef0e2;margin-bottom:22px;text-indent:.42em}
  h1 .g{color:#b6ff2e}
  .tag{font-family:"Anton",sans-serif;font-size:52px;text-transform:uppercase;color:#eef0e2;-webkit-text-stroke:1px #b6ff2e;margin-top:6px;letter-spacing:.02em}
  .foot{position:absolute;bottom:46px;left:0;right:0;display:flex;justify-content:center;gap:34px;align-items:center;
    font-family:"Space Mono",monospace;font-size:24px;letter-spacing:.14em;color:#8a917c;text-transform:uppercase}
  .foot b{color:#b6ff2e}
</style></head><body>
<svg width="0" height="0" style="position:absolute"><symbol id="sigil" viewBox="0 0 200 200">
  <circle cx="100" cy="100" r="92" fill="#0a0c08" stroke="#ff3b2f" stroke-width="12"/>
  <g fill="#b6ff2e"><ellipse cx="100" cy="104" rx="30" ry="42"/><ellipse cx="100" cy="72" rx="19" ry="17" fill="#8AE234"/><circle cx="100" cy="58" r="12"/>
  <path d="M94 50 C80 30 70 26 58 20" stroke="#b6ff2e" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M106 50 C120 30 130 26 142 20" stroke="#b6ff2e" stroke-width="4" fill="none" stroke-linecap="round"/>
  <g stroke="#b6ff2e" stroke-width="4.5" stroke-linecap="round"><path d="M74 84 L48 70"/><path d="M74 104 L44 104"/><path d="M74 124 L50 140"/><path d="M126 84 L152 70"/><path d="M126 104 L156 104"/><path d="M126 124 L150 140"/></g>
  <path d="M100 66 L100 140" stroke="#0a0c08" stroke-width="3"/></g>
  <line x1="38" y1="162" x2="162" y2="38" stroke="#ff3b2f" stroke-width="12" stroke-linecap="round"/>
</symbol></svg>
<div class="tape">★ Now Open · Franklin, TN ★ We ain't afraid of no roach ★</div>
<div class="stack">
  <p class="eyebrow">Field Extermination Unit</p>
  <svg class="sigil" viewBox="0 0 200 200"><use href="#sigil"/></svg>
  <h1><span class="the">The</span>Buggy <span class="g">Bros</span></h1>
  <p class="tag">Who You Gonna Call?</p>
</div>
<div class="foot"><span>Bugs · Snakes · Rodents</span><span>·</span><span><b>@thebuggybros</b></span></div>
</body></html>
