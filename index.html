<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>The Buggy Bros — Field Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#0d1218;--card:#151d25;--ink:#eef2f3;--mut:#8496a0;--line:#26333c;--amber:#f4b53f;--teal:#38cba7}
  *{margin:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);font-family:"Space Grotesk",system-ui,sans-serif;padding:34px 24px 80px;
    background-image:radial-gradient(70% 34% at 50% 0%,rgba(56,203,167,.05),transparent 60%)}
  a{text-decoration:none;color:inherit}
  .wrap{max-width:1080px;margin:0 auto}

  /* top bar */
  .bar{display:flex;align-items:center;gap:16px;margin-bottom:6px}
  .brand{font-weight:700;font-size:1.2rem;margin-right:auto}
  .brand b{color:var(--teal)}
  .ig{font-family:"IBM Plex Mono",monospace;font-size:.68rem;letter-spacing:.08em;color:#04120d;background:var(--teal);
    padding:8px 13px;border-radius:99px;font-weight:600}
  .tagline{font-family:"IBM Plex Mono",monospace;font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:var(--mut);margin-bottom:22px}

  /* geography filter */
  .filter{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
  .filter button{font-family:"Space Grotesk";font-size:.9rem;font-weight:600;color:var(--mut);background:var(--card);
    border:1px solid var(--line);border-radius:99px;padding:8px 16px;cursor:pointer;display:flex;gap:7px;align-items:center}
  .filter button .c{font-family:"IBM Plex Mono",monospace;font-size:.66rem;color:var(--mut)}
  .filter button.active{color:#04120d;background:var(--teal);border-color:var(--teal)}
  .filter button.active .c{color:#04120d;opacity:.7}
  .filter .checklist{margin-left:auto;font-family:"IBM Plex Mono",monospace;font-size:.68rem;color:var(--teal);align-self:center}

  /* grid of catch cards */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;display:flex;flex-direction:column}
  .photo{position:relative;aspect-ratio:4/3;overflow:hidden;background:#0e151b;display:grid;place-items:center}
  .photo img{width:100%;height:100%;object-fit:cover}
  .photo svg{width:56%;height:56%;color:var(--amber);filter:drop-shadow(0 0 14px rgba(244,181,63,.22))}
  .photo .reg{position:absolute;top:11px;right:11px;font-family:"IBM Plex Mono",monospace;font-size:.56rem;letter-spacing:.12em;
    text-transform:uppercase;color:#dfe8ea;background:rgba(0,0,0,.45);padding:4px 9px;border-radius:99px;backdrop-filter:blur(4px)}
  .b{padding:16px 18px 15px;display:flex;flex-direction:column;flex:1}
  .nm{font-size:1.3rem;font-weight:700;line-height:1.05}
  .sci{font-style:italic;color:var(--mut);font-size:.82rem;margin-top:2px}
  .one{color:#c4cdd3;font-size:.88rem;margin-top:10px;line-height:1.4;flex:1}
  .stats{display:flex;gap:7px;margin-top:15px}
  .stat{flex:1;text-align:center;background:#0e151b;border:1px solid var(--line);border-radius:10px;padding:10px 4px}
  .stat .v{font-size:1rem;font-weight:600;line-height:1.05}
  .stat .v small{font-size:.58rem;color:var(--mut);font-weight:400}
  .stat .k{font-family:"IBM Plex Mono",monospace;font-size:.48rem;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);margin-top:5px}
  .foot{margin-top:14px;display:flex;justify-content:space-between;align-items:center}
  .watch{font-family:"IBM Plex Mono",monospace;font-size:.64rem;color:var(--teal)}
  .more{font-family:"IBM Plex Mono",monospace;font-size:.58rem;color:#4f5f68}

  .empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--mut)}
  .empty h3{font-size:1.3rem;font-weight:600;color:var(--ink);margin-bottom:8px}
  .empty a{color:var(--teal);font-family:"IBM Plex Mono",monospace;font-size:.72rem}
  .foota{margin-top:34px;text-align:center;font-family:"IBM Plex Mono",monospace;font-size:.66rem;color:var(--mut)}
  .foota a{color:var(--teal)}
</style></head>
<body>
<div class="wrap">
  <div class="bar">
    <div class="brand">The Buggy <b>Bros</b></div>
    <a class="ig" href="https://www.instagram.com/thebuggybros/" target="_blank">Follow @thebuggybros</a>
  </div>
  <div class="tagline">Field Notes</div>

  <div class="filter" id="filter"></div>
  <div class="grid" id="grid"></div>

  <div class="foota">Want the full checklist of what's still out there? <a href="michigan.html">Michigan →</a> &nbsp; <a href="tennessee.html">Tennessee →</a></div>
  <div class="foota" style="margin-top:12px;opacity:.65">Used to know us for pest control? <a href="bugbusters/index.html">Our old BugBusters page →</a></div>
</div>
<script>
const SVG = {
 bee:`<g fill="currentColor"><ellipse cx="60" cy="60" rx="16" ry="19"/><circle cx="60" cy="38" r="9"/><circle cx="60" cy="24" r="8"/></g><g fill="#0e151b"><path d="M45 54 h30 v4 h-30 z"/><path d="M47 64 h26 v4 h-26 z"/><path d="M50 74 h20 v4 h-20 z"/></g><ellipse cx="83" cy="46" rx="17" ry="8" fill="currentColor" opacity=".3" stroke="currentColor" stroke-width="1.4" transform="rotate(26 83 46)"/><ellipse cx="37" cy="46" rx="17" ry="8" fill="currentColor" opacity=".3" stroke="currentColor" stroke-width="1.4" transform="rotate(-26 37 46)"/><path d="M56 17 C52 8 48 6 44 4 M64 17 C68 8 72 6 76 4" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round"/>`,
 grass:`<ellipse cx="52" cy="48" rx="24" ry="11" fill="currentColor"/><circle cx="28" cy="44" r="9" fill="currentColor"/><path d="M22 40 C14 30 12 26 8 22 M25 38 C19 30 17 26 15 20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M62 54 L84 38 L80 66" fill="none" stroke="currentColor" stroke-width="5" stroke-linejoin="round"/><path d="M80 66 L96 80" stroke="currentColor" stroke-width="4" stroke-linecap="round"/><g stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M44 58 L40 74"/><path d="M54 58 L54 76"/></g>`,
 ant:`<g fill="currentColor"><ellipse cx="86" cy="48" rx="18" ry="15"/><circle cx="60" cy="48" r="10"/><circle cx="34" cy="48" r="14"/></g><path d="M24 40 C16 28 12 24 6 18 M28 38 C22 26 20 22 16 14" stroke="currentColor" stroke-width="2.4" fill="none" stroke-linecap="round"/><g stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M58 44 L50 26"/><path d="M62 46 L64 26"/><path d="M66 46 L78 28"/><path d="M58 54 L50 72"/><path d="M62 56 L64 76"/><path d="M66 54 L78 72"/></g>`,
 snail:`<path d="M12 64 C12 54 26 52 40 54 L72 54" stroke="currentColor" stroke-width="8" fill="none" stroke-linecap="round"/><circle cx="76" cy="44" r="22" fill="none" stroke="currentColor" stroke-width="7"/><circle cx="76" cy="44" r="12" fill="none" stroke="currentColor" stroke-width="5"/><circle cx="76" cy="44" r="3" fill="currentColor"/><path d="M16 52 L12 40 M24 52 L24 38" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>`,
 daddy:`<circle cx="60" cy="46" r="7" fill="currentColor"/><g stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"><path d="M55 44 C30 20 18 18 6 24"/><path d="M55 46 C28 34 16 36 4 44"/><path d="M55 49 C30 52 16 60 8 74"/><path d="M56 51 C40 66 34 76 30 86"/><path d="M65 44 C90 20 102 18 114 24"/><path d="M65 46 C92 34 104 36 116 44"/><path d="M65 49 C90 52 104 60 112 74"/><path d="M64 51 C80 66 86 76 90 86"/></g>`,
 worm:`<path d="M16 42 C34 24 46 56 62 42 C78 28 90 58 104 44" fill="none" stroke="currentColor" stroke-width="13" stroke-linecap="round"/><g stroke="#0e151b" stroke-width="2" opacity=".7"><path d="M32 34 l-3 8 M46 44 l3 8 M62 42 l-2 8 M78 34 l3 8"/></g><circle cx="104" cy="44" r="2.4" fill="#0e151b"/>`
};
const CATCHES = [
 {name:'Dragonfly',sci:'Anax junius',state:'Michigan',photo:'photos/dragonfly.jpg',pos:'58% 42%',one:'One of the fastest insects alive — and it can fly backward and hover.',stats:[['8',' cm','Size'],['30',' mph','Top speed'],['Common',null,'How often']],reel:'https://www.instagram.com/reel/DaqDM9JOhbv/'},
 {name:'Robber Fly',sci:'Asilidae',state:'Michigan',photo:'photos/robberfly.jpg',pos:'50% 45%',one:'The assassin fly — snatches other insects out of the air and drains them dry.',stats:[['20',' mm','Size'],['Midair',null,'Ambush kills'],['Common',null,'How often']],reel:'https://www.instagram.com/reel/Daq655tOS7F/'},
 {name:'House Fly',sci:'Muscidae',state:'Michigan',photo:'photos/fly.jpg',pos:'54% 46%',one:'A drain-loving generalist — it tastes with its feet and sees in nearly every direction.',stats:[['7',' mm','Size'],['360','°','Vision'],['Common',null,'How often']],reel:null},
 {name:'Orb-weaver Spider',sci:'Araneidae',state:'Michigan',photo:'photos/spider.jpg',pos:'60% 40%',one:'Spins a fresh geometric web most nights, then recycles the old silk by eating it.',stats:[['12',' mm','Size'],['Nightly',null,'Web rebuild'],['Common',null,'How often']],reel:null},
 {name:'Honey Bee',sci:'Apis mellifera',state:'Michigan',svg:'bee',one:'The insect the entire sting-pain scale is measured against — the anchor at 2.',stats:[['14',' mm','Size'],['2',' / 4','Sting pain'],['Common',null,'How often']],reel:null},
 {name:'Grasshopper',sci:'Caelifera',state:'Michigan',svg:'grass',one:'Launches itself about twenty times its own body length in a single hop.',stats:[['40',' mm','Size'],['20','×','Jump'],['Common',null,'How often']],reel:'https://www.instagram.com/reel/DaqE9EGuulf/'},
 {name:'Ant',sci:'Formicidae',state:'Michigan',svg:'ant',one:'Hauls up to fifty times its own body weight — its neck can bear five thousand.',stats:[['5',' mm','Size'],['50','×','Lifts'],['Common',null,'How often']],reel:'https://www.instagram.com/reel/DaoqEALOXf1/'},
 {name:'Grove Snail',sci:'Cepaea nemoralis',state:'Michigan',svg:'snail',one:'Glides along on a ribbon of mucus at a blistering three-hundredths of a mile an hour.',stats:[['25',' mm','Size'],['0.03',' mph','Top speed'],['Common',null,'How often']],reel:'https://www.instagram.com/reel/DaoqEALOXf1/'},
 {name:'Daddy Longlegs',sci:'Opiliones',state:'Michigan',svg:'daddy',one:'Despite the playground legend, it has no venom and no fangs. Totally harmless.',stats:[['5',' cm','Size'],['None',null,'Venom'],['Common',null,'How often']],reel:'https://www.instagram.com/reel/DaoqEALOXf1/'},
 {name:'Earthworm',sci:'Lumbricina',state:'Michigan',svg:'worm',one:"Darwin's favorite animal — it quietly rebuilds the soil beneath your feet.",stats:[['10',' cm','Size'],['Engineer',null,'Soil builder'],['Common',null,'How often']],reel:'https://www.instagram.com/reel/DaoqEALOXf1/'}
];
const STATES = ['All','Michigan','Tennessee'];
let active = 'All';
function count(s){return s==='All'?CATCHES.length:CATCHES.filter(c=>c.state===s).length;}
function renderFilter(){
  document.getElementById('filter').innerHTML = STATES.map(s=>
    `<button class="${s===active?'active':''}" data-s="${s}">${s} <span class="c">${count(s)}</span></button>`).join('');
}
function card(c){
  const art = c.photo?`<img src="${c.photo}" alt="${c.name}" style="object-position:${c.pos||'58% 42%'}"/>`:`<svg viewBox="0 0 120 90">${SVG[c.svg]}</svg>`;
  return `<div class="card"><div class="photo">${art}<span class="reg">${c.state}</span></div>
    <div class="b"><div class="nm">${c.name}</div><div class="sci">${c.sci}</div><div class="one">${c.one}</div>
    <div class="stats">${c.stats.map(x=>`<div class="stat"><div class="v">${x[0]}${x[1]?`<small>${x[1]}</small>`:''}</div><div class="k">${x[2]}</div></div>`).join('')}</div>
    <div class="foot">${c.reel?`<a class="watch" href="${c.reel}" target="_blank">▸ watch the catch</a>`:`<span class="more">on our page</span>`}<span class="more">＋ detail</span></div></div></div>`;
}
function renderGrid(){
  const list = active==='All'?CATCHES:CATCHES.filter(c=>c.state===active);
  const g = document.getElementById('grid');
  if(!list.length){ g.innerHTML = `<div class="empty"><h3>Nothing logged in ${active} yet.</h3><p>The next frontier — <a href="${active.toLowerCase()}.html">see the ${active} checklist →</a></p></div>`; return; }
  g.innerHTML = list.map(card).join('');
}
document.getElementById('filter').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;active=b.dataset.s;renderFilter();renderGrid();});
renderFilter(); renderGrid();
</script>
</body></html>
