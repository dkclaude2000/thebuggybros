<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>The Buggy Bros — Field Notes</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Caveat:wght@600&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#0d1218;--card:#151d25;--ink:#eef2f3;--mut:#8496a0;--line:#26333c;--amber:#f4b53f;--teal:#38cba7}
  *{margin:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);font-family:"Space Grotesk",system-ui,sans-serif;padding:0 0 70px;
    background-image:radial-gradient(70% 30% at 50% 0%,rgba(56,203,167,.05),transparent 60%)}
  a{text-decoration:none;color:inherit}
  .wrap{max-width:1120px;margin:0 auto;padding:0 24px}
  @media(prefers-reduced-motion:reduce){*{animation:none!important}}

  .bar{display:flex;align-items:center;gap:16px;padding:24px 0 6px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1.2rem;margin-right:auto}
  .brand svg{height:36px;width:auto;flex:none}.brand b{color:var(--teal)}
  .ig{font-family:"IBM Plex Mono",monospace;font-size:.68rem;letter-spacing:.08em;color:#04120d;background:var(--teal);padding:8px 13px;border-radius:99px;font-weight:600}

  /* controls */
  .controls{display:flex;flex-wrap:wrap;gap:12px 20px;align-items:center;padding:14px 0 22px}
  .grp{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .grp .cap{font-family:"IBM Plex Mono",monospace;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--mut)}
  .pill{font-family:"Space Grotesk";font-size:.82rem;font-weight:600;color:var(--mut);background:var(--card);border:1px solid var(--line);border-radius:99px;padding:7px 13px;cursor:pointer;display:inline-flex;gap:6px;align-items:center}
  .pill .c{font-family:"IBM Plex Mono",monospace;font-size:.64rem}
  .pill.on{color:#04120d;background:var(--teal);border-color:var(--teal)}
  .pill.on .c{color:#04120d;opacity:.7}
  .grp.styles .pill.on{background:var(--amber);border-color:var(--amber);color:#241a06}
  .spacer{flex:1}

  /* grid */
  .stage{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px;justify-items:center;margin-top:6px}
  .cardslot{cursor:pointer;transition:transform .15s;width:300px;max-width:100%}
  .cardslot:hover{transform:translateY(-4px)}
  .empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--mut)}
  .empty h3{font-size:1.3rem;color:var(--ink);margin-bottom:8px}.empty a{color:var(--teal);font-family:"IBM Plex Mono",monospace;font-size:.72rem}

  img{display:block}
  .drawn{width:100%;height:100%;display:grid;place-items:center;background:radial-gradient(70% 80% at 50% 35%,rgba(56,203,167,.14),transparent 70%),#0e151b}
  .drawn svg{width:62%;height:62%;color:var(--amber);filter:drop-shadow(0 0 12px rgba(244,181,63,.22))}

  /* ---- style: MINIMAL ---- */
  .mini{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden}
  .mini .ph{aspect-ratio:1/1;overflow:hidden;position:relative}.mini .ph img{width:100%;height:100%;object-fit:cover}
  .mini .reg{position:absolute;top:11px;right:11px;font-family:"IBM Plex Mono",monospace;font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;color:#dfe8ea;background:rgba(0,0,0,.45);padding:4px 9px;border-radius:99px}
  .mini .b{padding:16px 18px 15px}.mini .nm{font-size:1.3rem;font-weight:700}.mini .sci{font-style:italic;color:var(--mut);font-size:.82rem;margin-top:2px}
  .mini .one{color:#c4cdd3;font-size:.86rem;margin-top:10px;line-height:1.4}
  .row3{display:flex;gap:7px;margin-top:14px}.row3 .st{flex:1;text-align:center;background:#0e151b;border:1px solid var(--line);border-radius:10px;padding:10px 4px}
  .row3 .st .v{font-size:.98rem;font-weight:600}.row3 .st .v small{font-size:.56rem;color:var(--mut);font-weight:400}
  .row3 .st .k{font-family:"IBM Plex Mono",monospace;font-size:.46rem;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);margin-top:5px}
  .wl{margin-top:13px;font-family:"IBM Plex Mono",monospace;font-size:.63rem;color:var(--teal);display:block}

  /* ---- POKÉMON ---- */
  .poke{border-radius:18px;padding:9px;background:linear-gradient(150deg,#f4b53f,#2ba88b 55%,#38cba7)}
  .poke-in{background:linear-gradient(180deg,#17202b,#0f1620);border-radius:12px;padding:11px 12px 12px;border:2px solid rgba(0,0,0,.35)}
  .poke-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .poke-top .pn{font-weight:700;font-size:1.12rem}.poke-top .hp{font-family:"IBM Plex Mono",monospace;color:var(--amber);font-weight:600;font-size:1.3rem;line-height:1}
  .poke-top .hp small{font-size:.55rem;color:#c9a24a;margin-right:2px;vertical-align:3px}
  .poke-win{position:relative;aspect-ratio:1.25/1;border:3px solid #d9b25a;border-radius:6px;overflow:hidden;background:#000}
  .poke-win img{width:100%;height:100%;object-fit:cover}
  .poke-win .holo{position:absolute;inset:0;background:linear-gradient(115deg,transparent 34%,rgba(255,255,255,.22) 46%,rgba(56,203,167,.2) 52%,transparent 66%);background-size:260% 260%;mix-blend-mode:screen;animation:holo 3.6s linear infinite;pointer-events:none}
  @keyframes holo{0%{background-position:0 0}100%{background-position:260% 260%}}
  .poke-win .type{position:absolute;top:7px;left:7px;font-family:"IBM Plex Mono",monospace;font-size:.54rem;letter-spacing:.1em;background:rgba(0,0,0,.55);color:var(--teal);padding:3px 7px;border-radius:99px}
  .poke-sub{font-family:"IBM Plex Mono",monospace;font-size:.55rem;color:var(--mut);text-align:center;margin:7px 0}
  .poke-move{background:rgba(56,203,167,.06);border:1px solid var(--line);border-radius:8px;padding:9px 11px}
  .poke-move b{font-size:.9rem;color:var(--amber)}.poke-move p{font-size:.77rem;color:#c4cdd3;line-height:1.35;margin-top:3px}
  .poke-foot{display:flex;justify-content:space-between;margin-top:9px;font-family:"IBM Plex Mono",monospace;font-size:.58rem;color:var(--mut)}.poke-foot .rar{color:var(--teal)}

  /* ---- HUD ---- */
  .hud{background:linear-gradient(180deg,#10171f,#0c1218);border:1px solid var(--line);border-radius:16px;overflow:hidden}
  .hud-ph{position:relative;aspect-ratio:1.3/1;overflow:hidden}.hud-ph img{width:100%;height:100%;object-fit:cover}
  .hud-ph::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 52%,#0c1218)}
  .cx{position:absolute;width:15px;height:15px;border:2px solid var(--teal);opacity:.8;z-index:2}
  .cx.tl{top:9px;left:9px;border-right:0;border-bottom:0}.cx.tr{top:9px;right:9px;border-left:0;border-bottom:0}
  .cx.bl{bottom:9px;left:9px;border-right:0;border-top:0}.cx.br{bottom:9px;right:9px;border-left:0;border-top:0}
  .hud-ph .ovr{position:absolute;top:10px;right:30px;z-index:3;text-align:right;font-family:"IBM Plex Mono",monospace;color:var(--amber)}
  .hud-ph .ovr b{font-size:1.9rem;font-weight:600;line-height:.9;display:block}.hud-ph .ovr small{font-size:.52rem;letter-spacing:.12em;color:#c9a24a}
  .hud-b{padding:2px 16px 15px}.hud-nm{font-size:1.3rem;font-weight:700}.hud-nm span{font-style:italic;font-weight:400;font-size:.8rem;color:var(--mut);margin-left:6px}
  .hud-tag{font-family:"IBM Plex Mono",monospace;font-size:.55rem;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);margin:6px 0 11px}
  .hchips{display:flex;gap:7px}.hchip{flex:1;text-align:center;border:1px solid var(--line);border-radius:9px;padding:8px 3px;background:#0a1119}
  .hchip .v{font-family:"IBM Plex Mono",monospace;font-weight:600;font-size:.86rem}.hchip .v small{color:var(--mut);font-size:.52rem}
  .hchip .k{font-family:"IBM Plex Mono",monospace;font-size:.44rem;letter-spacing:.06em;text-transform:uppercase;color:var(--mut);margin-top:4px}

  /* ---- ANIMATED ---- */
  .anim{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden}
  .anim-stage{aspect-ratio:1.3/1;display:grid;place-items:center;position:relative;overflow:hidden;background:radial-gradient(70% 90% at 50% 30%,rgba(56,203,167,.16),transparent 70%),#0e151b}
  .anim-stage svg{width:62%;color:var(--amber);animation:bob 2.6s ease-in-out infinite;filter:drop-shadow(0 0 14px rgba(244,181,63,.25))}
  .anim-stage .w{transform-box:fill-box}.anim-stage .wl1,.anim-stage .wl2{transform-origin:right center}.anim-stage .wr1,.anim-stage .wr2{transform-origin:left center}
  .anim-stage .wl1{animation:flapL .42s ease-in-out infinite}.anim-stage .wr1{animation:flapR .42s ease-in-out infinite}
  .anim-stage .wl2{animation:flapL .42s ease-in-out infinite .05s}.anim-stage .wr2{animation:flapR .42s ease-in-out infinite .05s}
  @keyframes flapL{0%,100%{transform:rotate(0)}50%{transform:rotate(11deg)}}@keyframes flapR{0%,100%{transform:rotate(0)}50%{transform:rotate(-11deg)}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .anim .b{padding:14px 18px 15px}.anim .nm{font-size:1.3rem;font-weight:700}.anim .sci{font-style:italic;color:var(--mut);font-size:.82rem;margin-top:2px}
  .anim .one{color:#c4cdd3;font-size:.86rem;margin-top:9px;line-height:1.4}

  /* ---- MULTI ---- */
  .multi{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden}
  .multi .main{position:relative;aspect-ratio:1.2/1;overflow:hidden}.multi .main img{width:100%;height:100%;object-fit:cover}
  .multi .inset{position:absolute;right:12px;bottom:12px;width:80px;height:80px;border-radius:12px;border:2px solid var(--teal);background:#0e151b;display:grid;place-items:center;box-shadow:0 6px 16px rgba(0,0,0,.5)}
  .multi .inset svg{width:72%;color:var(--amber)}
  .multi .inset .lbl{position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);font-family:"IBM Plex Mono",monospace;font-size:.5rem;background:var(--teal);color:#04120d;padding:2px 6px;border-radius:99px;white-space:nowrap}
  .multi .strip{display:flex;gap:6px;padding:10px 12px 0}.multi .strip .t{flex:1;aspect-ratio:1/1;border-radius:7px;overflow:hidden;border:1px solid var(--line);opacity:.75}
  .multi .strip .t.on{opacity:1;border-color:var(--teal)}.multi .strip .t img{width:100%;height:100%;object-fit:cover}
  .multi .strip .t.draw{display:grid;place-items:center;background:#0e151b}.multi .strip .t.draw svg{width:70%;color:var(--amber)}
  .multi .strip .t.map{display:grid;place-items:center;background:#0e151b;color:var(--teal);font-family:"IBM Plex Mono";font-size:.7rem}
  .multi .b{padding:11px 14px 14px}.multi .nm{font-size:1.24rem;font-weight:700}.multi .sci{font-style:italic;color:var(--mut);font-size:.8rem;margin-top:1px}

  /* ---- POLAROID ---- */
  .pola{width:270px;margin:0 auto;background:#f3efe6;border-radius:4px;padding:14px 14px 8px;transform:rotate(-2deg);box-shadow:0 16px 34px rgba(0,0,0,.5);position:relative}
  .pola .tape{position:absolute;top:-10px;left:50%;transform:translateX(-50%) rotate(-3deg);width:90px;height:26px;background:rgba(56,203,167,.45);border:1px dashed rgba(20,60,50,.4)}
  .pola .ph{aspect-ratio:1/1;overflow:hidden;background:#000}.pola .ph img{width:100%;height:100%;object-fit:cover}
  .pola .cap{font-family:"Caveat",cursive;font-size:1.5rem;color:#1c2a22;text-align:center;margin-top:8px;line-height:1}
  .pola .cap small{display:block;font-family:"IBM Plex Mono",monospace;font-size:.55rem;color:#6a7a5f;letter-spacing:.08em;margin-top:4px}
  .pola .stamp{display:flex;justify-content:center;gap:8px;margin:6px 0 4px;font-family:"IBM Plex Mono",monospace;font-size:.56rem;color:#4a5a44}.pola .stamp b{color:#1c2a22}

  /* ---- SINGLE / DETAIL MODAL ---- */
  .modal{position:fixed;inset:0;z-index:60;background:rgba(6,10,14,.8);backdrop-filter:blur(6px);display:none;align-items:flex-start;justify-content:center;overflow:auto;padding:40px 20px}
  .modal.open{display:flex}
  .detail{width:min(880px,100%);background:var(--card);border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.6);display:grid;grid-template-columns:320px 1fr}
  @media(max-width:720px){.detail{grid-template-columns:1fr}}
  .detail .left{padding:24px;display:grid;place-items:center;background:radial-gradient(80% 60% at 50% 20%,rgba(56,203,167,.06),transparent 70%);border-right:1px solid var(--line)}
  @media(max-width:720px){.detail .left{border-right:0;border-bottom:1px solid var(--line)}}
  .detail .left .cardslot{cursor:default}.detail .left .cardslot:hover{transform:none}
  .detail .info{padding:26px 28px 24px;position:relative}
  .detail .x{position:absolute;top:14px;right:16px;width:30px;height:30px;border-radius:50%;background:#0e151b;border:1px solid var(--line);color:var(--ink);font-size:1rem;cursor:pointer}
  .detail .eyebrow{font-family:"IBM Plex Mono",monospace;font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--teal)}
  .detail h2{font-size:1.9rem;font-weight:700;margin:6px 0 1px;line-height:1}
  .detail .sci{font-style:italic;color:var(--mut);font-size:.95rem}
  .detail .cls{font-family:"IBM Plex Mono",monospace;font-size:.64rem;color:var(--mut);margin-top:8px}
  .detail .desc{color:#cdd6dd;font-size:.95rem;line-height:1.55;margin:14px 0 16px}
  .detail .big3{display:flex;gap:8px;margin-bottom:16px}
  .detail .big3 .st{flex:1;text-align:center;background:#0e151b;border:1px solid var(--line);border-radius:11px;padding:12px 5px}
  .detail .big3 .st .v{font-size:1.15rem;font-weight:600}.detail .big3 .st .v small{font-size:.6rem;color:var(--mut);font-weight:400}
  .detail .big3 .st .k{font-family:"IBM Plex Mono",monospace;font-size:.5rem;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);margin-top:5px}
  .detail .facts{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:16px}
  .detail .facts div{background:var(--card);padding:10px 12px}
  .detail .facts .k{font-family:"IBM Plex Mono",monospace;font-size:.52rem;letter-spacing:.08em;text-transform:uppercase;color:var(--mut)}
  .detail .facts .v{font-size:.88rem;margin-top:2px}
  .detail .actions{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .detail .watch{font-family:"IBM Plex Mono",monospace;font-size:.72rem;color:var(--teal)}
  .detail .nav{display:flex;gap:8px}
  .detail .nav button{background:#0e151b;border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:8px 12px;cursor:pointer;font-family:"IBM Plex Mono",monospace;font-size:.7rem}
  .detail .nav button:hover{border-color:var(--teal);color:var(--teal)}

  footer{border-top:1px solid var(--line);margin-top:40px;padding-top:24px;text-align:center}
  footer .l{font-family:"IBM Plex Mono",monospace;font-size:.68rem;color:var(--mut)}
  footer .l a{color:var(--teal)}
  footer .arch{margin-top:10px;font-family:"IBM Plex Mono",monospace;font-size:.64rem;color:#5f6f78;opacity:.75}
  footer .arch a{color:#6f8a9a}
</style></head>

 ant:`<g fill="currentColor"><ellipse cx="86" cy="48" rx="18" ry="15"/><circle cx="60" cy="48" r="10"/><circle cx="34" cy="48" r="14"/></g><g stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M58 44 L50 26"/><path d="M62 46 L64 26"/><path d="M66 46 L78 28"/><path d="M58 54 L50 72"/><path d="M62 56 L64 76"/><path d="M66 54 L78 72"/></g>`,

const pic = c => c.photo ? `<img src="${c.photo}" alt="${c.name}" style="object-position:${c.pos||'50% 50%'}">` : `<div class="drawn"><svg viewBox="0 0 120 90">${SVG[c.svg]}</svg></div>`;
const stat = s => `<div class="st"><div class="v">${s[0]}${s[1]?`<small>${s[1]}</small>`:''}</div><div class="k">${s[2]}</div></div>`;
const hero = c => c.stats[1];

const STYLES = {
 mini:{label:'Minimal', fn:c=>`<div class="mini"><div class="ph">${pic(c)}<span class="reg">${c.state}</span></div><div class="b"><div class="nm">${c.name}</div><div class="sci">${c.sci}</div><div class="one">${c.one}</div><div class="row3">${c.stats.map(stat).join('')}</div>${c.reel?`<span class="wl">▸ watch the catch</span>`:''}</div></div>`},
 poke:{label:'Card', fn:c=>{const h=hero(c);return `<div class="poke"><div class="poke-in"><div class="poke-top"><span class="pn">${c.name}</span><span class="hp"><small>${(h[2]||'').toUpperCase().slice(0,3)}</small>${h[0]}</span></div><div class="poke-win">${pic(c)}${c.photo?'<span class="holo"></span>':''}<span class="type">✦ ${c.type}</span></div><div class="poke-sub">${c.sci} · ${c.state}</div><div class="poke-move"><b>✦ ${c.move}</b><p>${c.one}</p></div><div class="poke-foot"><span>SIZE ${c.stats[0][0]}${c.stats[0][1]||''}</span><span class="rar">◆ Common</span></div></div></div>`}},
 hud:{label:'HUD', fn:c=>{const h=hero(c);return `<div class="hud"><div class="hud-ph">${pic(c)}<span class="cx tl"></span><span class="cx tr"></span><span class="cx bl"></span><span class="cx br"></span><span class="ovr"><b>${h[0]}</b><small>${(h[1]||h[2]||'').toString().toUpperCase().trim()}</small></span></div><div class="hud-b"><div class="hud-nm">${c.name}<span>${c.sci}</span></div><div class="hud-tag">Class · ${c.type} · ${c.state}</div><div class="hchips">${c.stats.map(s=>`<div class="hchip"><div class="v">${s[0]}${s[1]?`<small>${s[1]}</small>`:''}</div><div class="k">${s[2]}</div></div>`).join('')}</div></div></div>`}},
 anim:{label:'Animated', fn:c=>`<div class="anim"><div class="anim-stage"><svg viewBox="0 0 120 90">${SVG[c.svg]}</svg></div><div class="b"><div class="nm">${c.name}</div><div class="sci">${c.sci}</div><div class="one">${c.one}</div><div class="row3">${c.stats.map(stat).join('')}</div></div></div>`},
 multi:{label:'Multi', fn:c=>`<div class="multi"><div class="main">${pic(c)}<div class="inset"><svg viewBox="0 0 120 90">${SVG[c.svg]}</svg><span class="lbl">+ illustration</span></div></div><div class="strip"><div class="t on">${pic(c)}</div><div class="t draw"><svg viewBox="0 0 120 90">${SVG[c.svg]}</svg></div><div class="t map">MI</div></div><div class="b"><div class="nm">${c.name}</div><div class="sci">${c.sci}</div><div class="row3">${c.stats.map(stat).join('')}</div></div></div>`},
 pola:{label:'Snapshot', fn:c=>`<div class="pola"><span class="tape"></span><div class="ph">${pic(c)}</div><div class="cap">${c.name}<small>${c.sci.toUpperCase()} · ${c.state.toUpperCase()}</small></div><div class="stamp"><span>${c.stats[0][0]}${c.stats[0][1]||''}</span><span>·</span><span><b>${hero(c)[0]}${hero(c)[1]||''}</b></span><span>·</span><span>Common</span></div></div>`}

let style = localStorage.getItem('bb-card-style') || 'poke';
if(!STYLES[style]) style='poke';
let geo = 'All';
const STATES=['All','Michigan','Tennessee'];
const cnt = s => s==='All'?DATA.length:DATA.filter(c=>c.state===s).length;

function controls(){
  document.getElementById('geo').innerHTML = STATES.map(s=>`<button class="pill ${s===geo?'on':''}" data-g="${s}">${s} <span class="c">${cnt(s)}</span></button>`).join('');
  document.getElementById('styles').innerHTML = Object.entries(STYLES).map(([k,v])=>`<button class="pill ${k===style?'on':''}" data-s="${k}">${v.label}</button>`).join('');
}
function grid(){
  const stage=document.getElementById('stage');
  const list = geo==='All'?DATA:DATA.filter(c=>c.state===geo);
  if(!list.length){ stage.innerHTML=`<div class="empty"><h3>Nothing logged in ${geo} yet.</h3><p><a href="${geo.toLowerCase()}.html">See the ${geo} checklist →</a></p></div>`; return; }
  stage.innerHTML = list.map(c=>{const i=DATA.indexOf(c);return `<div class="cardslot" data-i="${i}">${STYLES[style].fn(c)}</div>`}).join('');
}
function openDetail(i){
  const c=DATA[i], d=document.getElementById('detail');
  d.innerHTML = `<div class="left"><div class="cardslot">${STYLES[style].fn(c)}</div></div>
   <div class="info"><button class="x" onclick="closeDetail()">✕</button>
    <div class="eyebrow">Caught · ${c.state} · No. ${String(i+1).padStart(2,'0')}</div>
    <h2>${c.name}</h2><div class="sci">${c.sci}</div>
    <div class="cls">${c.facts[0][0]} · ${c.facts[0][1]}</div>
    <p class="desc">${c.desc}</p>
    <div class="big3">${c.stats.map(stat).join('')}</div>
    <div class="facts">${c.facts.map(f=>`<div><div class="k">${f[0]}</div><div class="v">${f[1]}</div></div>`).join('')}</div>
    <div class="actions">${c.reel?`<a class="watch" href="${c.reel}" target="_blank">▸ watch the catch</a>`:`<span class="watch" style="color:#5f6f78">on our page</span>`}
      <div class="nav"><button onclick="step(-1)">‹ Prev</button><button onclick="step(1)">Next ›</button></div></div>
   </div>`;
  document.getElementById('modal').classList.add('open');
  document.getElementById('modal').dataset.i=i;
}
function step(n){const i=(+document.getElementById('modal').dataset.i+n+DATA.length)%DATA.length;openDetail(i);}
function closeDetail(){document.getElementById('modal').classList.remove('open');}
document.getElementById('geo').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;geo=b.dataset.g;controls();grid();});
document.getElementById('styles').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;style=b.dataset.s;localStorage.setItem('bb-card-style',style);controls();grid();});
document.getElementById('stage').addEventListener('click',e=>{const s=e.target.closest('.cardslot');if(s)openDetail(+s.dataset.i);});
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeDetail();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail();if(document.getElementById('modal').classList.contains('open')){if(e.key==='ArrowLeft')step(-1);if(e.key==='ArrowRight')step(1);}});
controls(); grid();
</script>
