<style>
  :root{--bg:#0d1218;--card:#151d25;--ink:#eef2f3;--mut:#8496a0;--line:#26333c;--amber:#f4b53f;--teal:#38cba7;--dk:#0e151b}
  *{margin:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);font-family:"Space Grotesk",system-ui,sans-serif;padding:0 0 70px;
    background-image:radial-gradient(70% 30% at 50% 0%,rgba(56,203,167,.05),transparent 60%)}
  a{text-decoration:none;color:inherit}
  .wrap{max-width:1120px;margin:0 auto;padding:0 24px}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  .bar{display:flex;align-items:center;gap:16px;padding:24px 0 6px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1.2rem;margin-right:auto}
  .brand svg{height:36px;width:auto;flex:none}.brand b{color:var(--teal)}
  .ig{font-family:"IBM Plex Mono",monospace;font-size:.68rem;letter-spacing:.08em;color:#04120d;background:var(--teal);padding:8px 13px;border-radius:99px;font-weight:600}

  .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;padding:14px 0 22px}
  .pill{font-family:"Space Grotesk";font-size:.82rem;font-weight:600;color:var(--mut);background:var(--card);border:1px solid var(--line);border-radius:99px;padding:7px 13px;cursor:pointer;display:inline-flex;gap:6px;align-items:center}
  .pill .c{font-family:"IBM Plex Mono",monospace;font-size:.64rem}
  .pill.on{color:#04120d;background:var(--teal);border-color:var(--teal)}.pill.on .c{color:#04120d;opacity:.7}
  .hint{margin-left:auto;font-family:"IBM Plex Mono",monospace;font-size:.62rem;color:#5f6f78;align-self:center}

  .stage{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:26px;justify-items:center;margin-top:6px}
  .empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--mut)}
  .empty h3{font-size:1.3rem;color:var(--ink);margin-bottom:8px}.empty a{color:var(--teal);font-family:"IBM Plex Mono",monospace;font-size:.72rem}
  img{display:block}
  .drawn{width:100%;height:100%;display:grid;place-items:center;background:radial-gradient(70% 80% at 50% 35%,rgba(56,203,167,.14),transparent 70%),#0e151b}
  .drawn svg{width:56%;height:56%;color:var(--amber);filter:drop-shadow(0 0 12px rgba(244,181,63,.22))}

  /* ---- flip card ---- */
  .flip{width:300px;aspect-ratio:5/7;perspective:1300px;cursor:pointer}
  .flip-inner{position:relative;width:100%;height:100%;transition:transform .7s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d}
  .flip:hover .flip-inner,.flip.flipped .flip-inner{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:16px;overflow:hidden;border:1px solid var(--line);box-shadow:0 16px 36px rgba(0,0,0,.5)}
  .face.back{transform:rotateY(180deg)}

  .front{background:var(--card)}
  .front .photo{position:absolute;top:0;left:0;right:0;height:50%;overflow:hidden}
  .front .photo img{width:100%;height:100%;object-fit:cover}
  .front .chip{position:absolute;top:11px;left:11px;z-index:3;width:32px;height:32px;border-radius:8px;border:1.5px solid var(--teal);background:rgba(9,14,20,.72);display:grid;place-items:center}
  .front .chip svg{width:76%;height:76%}
  .front .body{position:absolute;left:0;right:0;bottom:0;top:50%;padding:13px 15px 12px;display:flex;flex-direction:column}
  .front .b-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .front .b-name{font-size:1.4rem;font-weight:700;line-height:1;flex:1;min-width:0}
  .front .rar{flex:none;font-family:"IBM Plex Mono",monospace;font-size:.5rem;letter-spacing:.06em;color:var(--teal);border:1px solid var(--teal);border-radius:99px;padding:3px 7px}
  .front .b-sci{font-style:italic;color:var(--mut);font-size:.8rem;margin-top:2px}
  .front .one{color:#c4cdd3;font-size:.83rem;line-height:1.38;margin-top:9px}
  .front .stats{display:flex;gap:7px;margin-top:auto}
  .front .stat{flex:1;text-align:center;background:var(--dk);border:1px solid var(--line);border-radius:10px;padding:8px 4px}
  .front .stat .v{font-size:.98rem;font-weight:700;color:var(--amber)}.front .stat .v small{font-size:.55rem;color:var(--mut);font-weight:400}
  .front .stat .k{font-family:"IBM Plex Mono",monospace;font-size:.44rem;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);margin-top:5px}
  .front .foot{display:flex;justify-content:space-between;align-items:center;margin-top:9px;padding-top:9px;border-top:1px solid var(--line);font-family:"IBM Plex Mono",monospace;font-size:.58rem;letter-spacing:.04em}
  .front .foot .hdl{color:var(--teal)}.front .foot .idn{color:var(--mut)}

  .back-c{position:absolute;inset:0;background:linear-gradient(180deg,#141d26,#0d141b);padding:15px 15px 12px;display:flex;flex-direction:column}
  .back-c .bh{display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--line);padding-bottom:9px}
  .back-c .chip{width:28px;height:28px;border-radius:8px;border:1.5px solid var(--teal);background:#0b1119;display:grid;place-items:center;flex:none}
  .back-c .chip svg{width:76%;height:76%}
  .back-c .bt{flex:1}.back-c .bt .n{font-weight:700;font-size:1.12rem;line-height:1}.back-c .bt .s{font-style:italic;color:var(--mut);font-size:.72rem}
  .back-c .bn{font-family:"IBM Plex Mono",monospace;font-size:.58rem;color:var(--amber);font-weight:600}
  .back-c .desc{font-size:.78rem;color:#cdd6dd;line-height:1.48;margin:10px 0 9px}
  .back-c .facts{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;margin-bottom:10px}
  .back-c .facts .k{font-family:"IBM Plex Mono",monospace;font-size:.46rem;letter-spacing:.06em;text-transform:uppercase;color:var(--mut)}
  .back-c .facts .v{font-size:.78rem}
  .back-c .callout{margin-top:auto;border:1px solid rgba(244,181,63,.4);background:rgba(244,181,63,.06);border-radius:10px;padding:9px 11px}
  .back-c .callout .ct{font-family:"IBM Plex Mono",monospace;font-size:.5rem;letter-spacing:.12em;text-transform:uppercase;color:var(--amber)}
  .back-c .callout .cv{font-size:.8rem;color:#e7edf1;line-height:1.38;margin-top:3px}
  .back-c .bfoot{display:flex;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px solid var(--line);font-family:"IBM Plex Mono",monospace;font-size:.55rem}
  .back-c .bfoot .hdl{color:var(--teal)}.back-c .bfoot .w{color:var(--mut)}

  footer{border-top:1px solid var(--line);margin-top:40px;padding-top:24px;text-align:center}
  footer .l{font-family:"IBM Plex Mono",monospace;font-size:.68rem;color:var(--mut)}footer .l a{color:var(--teal)}
  footer .arch{margin-top:10px;font-family:"IBM Plex Mono",monospace;font-size:.64rem;color:#5f6f78}footer .arch a{color:#6f8a9a}
</style></head>

<script>
const DATA = [
 {id:'BB-001',name:'Dragonfly',sci:'Anax junius',svg:'dragon',photo:'photos/dragonfly.jpg',pos:'50% 45%',state:'MI',rarity:'Common',
  stats:[['8',' cm','Size'],['30',' mph','Top speed'],['Flyer',null,'Type']],
  one:'One of the fastest insects alive — and it can fly backward and hover.',
  desc:"The common green darner is one of North America's largest, fastest dragonflies — and one of the few insects that migrates, some travelling hundreds of miles south each fall.",
  facts:[['Order','Odonata'],['Where','Ponds & meadows'],['Diet','Flying insects'],['Threat','Harmless']],
  callout:['Lifecycle','Spends 1–2 years underwater as a nymph, then emerges to fly for only a few weeks.'],
  reel:'https://www.instagram.com/reel/DaqDM9JOhbv/'},
 {id:'BB-002',name:'Robber Fly',sci:'Asilidae',svg:'robber',photo:'photos/robberfly.jpg',pos:'50% 45%',state:'MI',rarity:'Common',

 {id:'BB-003',name:'Orb-weaver',sci:'Araneidae',svg:'spider',photo:'photos/spider.jpg',pos:'60% 40%',state:'MI',rarity:'Common',
  stats:[['12',' mm','Size'],['Nightly',null,'Web'],['Weaver',null,'Type']],
  one:'Spins a fresh geometric web most nights, then recycles the old silk by eating it.',
  desc:"Orb-weavers build the classic wheel-shaped web, rebuilding it most nights. They're shy and their venom is harmless to people.",
  facts:[['Order','Araneae'],['Where','Gardens & eaves'],['Diet','Flying insects'],['Threat','Harmless']],
  callout:['The Web','Eats its old web each night to recycle the silk protein, then spins a brand-new one.'],
  reel:null},
 {id:'BB-004',name:'Honey Bee',sci:'Apis mellifera',svg:'bee',photo:null,state:'MI',rarity:'Common',
  stats:[['14',' mm','Size'],['2',' / 4','Sting'],['Pollinator',null,'Type']],
  one:'The insect the entire sting-pain scale is measured against — the anchor at 2.',
  desc:"The honey bee is the benchmark for the Schmidt sting-pain scale. One hive holds tens of thousands of workers; a forager may visit hundreds of flowers per trip.",
  facts:[['Order','Hymenoptera'],['Where','Flowers & hives'],['Diet','Nectar & pollen'],['Threat','Stings (barbed)']],

  reel:null},
 {id:'BB-005',name:'Grasshopper',sci:'Caelifera',svg:'grass',photo:null,state:'MI',rarity:'Common',
  stats:[['40',' mm','Size'],['20','×','Jump'],['Jumper',null,'Type']],
  one:'Launches itself about twenty times its own body length in a single hop.',
  desc:"Grasshoppers use catapult-like hind legs that store and release energy to leap huge distances. Many also 'sing' by rubbing a leg against a wing.",
  facts:[['Order','Orthoptera'],['Where','Grassy fields'],['Diet','Plants'],['Threat','Harmless']],

const STATE_NAME={MI:'Michigan',TN:'Tennessee'};

const pic = c => c.photo ? `<img src="${c.photo}" alt="${c.name}" style="object-position:${c.pos||'50% 45%'}">` : `<div class="drawn"><svg viewBox="0 0 120 90"><use href="#${c.svg}"/></svg></div>`;
const stat = s => `<div class="stat"><div class="v">${s[0]}${s[1]?`<small>${s[1]}</small>`:''}</div><div class="k">${s[2]}</div></div>`;

function frontHTML(c){
  return `<div class="face front">
    <div class="photo">${pic(c)}<span class="chip"><svg><use href="#jar"/></svg></span></div>
    <div class="body">
      <div class="b-head"><span class="b-name">${c.name}</span><span class="rar">◆ ${c.rarity}</span></div>
      <div class="b-sci">${c.sci}</div>
      <div class="one">${c.one}</div>
      <div class="stats">${c.stats.map(stat).join('')}</div>
      <div class="foot"><span class="hdl">@thebuggybros</span><span class="idn">${c.id} · ${c.state}</span></div>
    </div></div>`;
}
function backHTML(c){
  return `<div class="face back"><div class="back-c">
    <div class="bh"><span class="chip"><svg><use href="#jar"/></svg></span><div class="bt"><div class="n">${c.name}</div><div class="s">${c.sci}</div></div><span class="bn">${c.id}</span></div>
    <div class="desc">${c.desc}</div>
    <div class="facts">${c.facts.map(f=>`<div><div class="k">${f[0]}</div><div class="v">${f[1]}</div></div>`).join('')}</div>
    <div class="callout"><div class="ct">◷ ${c.callout[0]}</div><div class="cv">${c.callout[1]}</div></div>
    <div class="bfoot"><span class="hdl">@thebuggybros</span><span class="w">thebuggybros.com</span></div>
  </div></div>`;
}
function cardHTML(c,i){
  return `<div class="flip" data-i="${i}"><div class="flip-inner">${frontHTML(c)}${backHTML(c)}</div></div>`;
}

let geo='All';
const STATES=['All','MI','TN'];
const cnt=s=>s==='All'?DATA.length:DATA.filter(c=>c.state===s).length;
function controls(){
  document.getElementById('geo').innerHTML = STATES.map(s=>`<button class="pill ${s===geo?'on':''}" data-g="${s}">${s==='All'?'All':STATE_NAME[s]} <span class="c">${cnt(s)}</span></button>`).join('');
}
function grid(){
  const stage=document.getElementById('stage');
  const list = geo==='All'?DATA:DATA.filter(c=>c.state===geo);
  if(!list.length){ stage.innerHTML=`<div class="empty"><h3>Nothing logged in ${STATE_NAME[geo]||geo} yet.</h3><p><a href="${(STATE_NAME[geo]||geo).toLowerCase()}.html">See the checklist →</a></p></div>`; return; }
  stage.innerHTML = list.map(c=>cardHTML(c,DATA.indexOf(c))).join('');
}
document.getElementById('geo').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;geo=b.dataset.g;controls();grid();});
// tap-to-flip on touch; on desktop hover handles it
document.getElementById('stage').addEventListener('click',e=>{const f=e.target.closest('.flip');if(f)f.classList.toggle('flipped');});
controls(); grid();
</script>
</body></html>
